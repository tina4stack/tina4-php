name: PHP Composer

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: openssl, libxml, json, curl, fileinfo, zip, sqlite3
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-interbase

      - name: Initialize framework
        run: composer exec tina4 initialize:run

      - name: Run test suite
        run: composer exec tina4 tests:run tina4
