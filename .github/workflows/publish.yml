name: Publish Release

on:
  push:
    tags:
      - '[0-9]*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # softprops/action-gh-release calls the GitHub REST API with the
    # default GITHUB_TOKEN. That token only writes to the repository if
    # the job declares contents:write. Make it explicit so we don't
    # depend on the repo-level Workflow permissions setting.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for git log on the tagged commit

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Extract release notes from commit body
        run: |
          # Pull the tagged commit body (sans Co-Authored-By trailers and
          # trailing blank lines). The body is the narrative the maintainer
          # already writes for each release — piping it straight into the
          # GitHub release beats a bare "Full Changelog" link.
          git log -1 "${GITHUB_REF_NAME}" --pretty=%B \
            | awk '/^Co-Authored-By:/ { skip=1 } !skip { print }' \
            | sed -e :a -e '/^[[:space:]]*$/{$d;N;ba' -e '}' \
            > /tmp/release-notes.md
          echo "── /tmp/release-notes.md ──"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md

      - name: Notify Packagist
        env:
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -n "${PACKAGIST_TOKEN}" ]; then
            curl -s -XPOST "https://packagist.org/api/update-package?username=tina4stack&apiToken=${PACKAGIST_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"repository":{"url":"https://github.com/tina4stack/tina4-php"}}'
            echo "Packagist notified."
          else
            echo "PACKAGIST_TOKEN not set — skipping Packagist notification."
          fi
