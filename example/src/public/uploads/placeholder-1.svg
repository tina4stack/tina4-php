<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="12" fill="#1b4332"/>
  <rect x="20" y="20" width="360" height="360" rx="8" fill="#2d6a4f" opacity="0.5"/>
  <!-- CPU/chip icon for Electronics -->
  <rect x="140" y="120" width="120" height="120" rx="8" fill="none" stroke="#95d5b2" stroke-width="4"/>
  <rect x="165" y="145" width="70" height="70" rx="4" fill="#95d5b2" opacity="0.3"/>
  <rect x="180" y="160" width="40" height="40" rx="2" fill="#95d5b2"/>
  <!-- pins top -->
  <line x1="165" y1="120" x2="165" y2="100" stroke="#95d5b2" stroke-width="3"/>
  <line x1="185" y1="120" x2="185" y2="100" stroke="#95d5b2" stroke-width="3"/>
  <line x1="205" y1="120" x2="205" y2="100" stroke="#95d5b2" stroke-width="3"/>
  <line x1="225" y1="120" x2="225" y2="100" stroke="#95d5b2" stroke-width="3"/>
  <!-- pins bottom -->
  <line x1="165" y1="240" x2="165" y2="260" stroke="#95d5b2" stroke-width="3"/>
  <line x1="185" y1="240" x2="185" y2="260" stroke="#95d5b2" stroke-width="3"/>
  <line x1="205" y1="240" x2="205" y2="260" stroke="#95d5b2" stroke-width="3"/>
  <line x1="225" y1="240" x2="225" y2="260" stroke="#95d5b2" stroke-width="3"/>
  <!-- pins left -->
  <line x1="140" y1="145" x2="120" y2="145" stroke="#95d5b2" stroke-width="3"/>
  <line x1="140" y1="165" x2="120" y2="165" stroke="#95d5b2" stroke-width="3"/>
  <line x1="140" y1="185" x2="120" y2="185" stroke="#95d5b2" stroke-width="3"/>
  <line x1="140" y1="205" x2="120" y2="205" stroke="#95d5b2" stroke-width="3"/>
  <!-- pins right -->
  <line x1="260" y1="145" x2="280" y2="145" stroke="#95d5b2" stroke-width="3"/>
  <line x1="260" y1="165" x2="280" y2="165" stroke="#95d5b2" stroke-width="3"/>
  <line x1="260" y1="185" x2="280" y2="185" stroke="#95d5b2" stroke-width="3"/>
  <line x1="260" y1="205" x2="280" y2="205" stroke="#95d5b2" stroke-width="3"/>
  <text x="200" y="310" text-anchor="middle" fill="#95d5b2" font-family="system-ui,sans-serif" font-size="22" font-weight="600">Electronics</text>
</svg>
