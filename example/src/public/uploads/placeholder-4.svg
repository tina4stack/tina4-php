<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="12" fill="#14532d"/>
  <rect x="20" y="20" width="360" height="360" rx="8" fill="#166534" opacity="0.3"/>
  <!-- House icon for Home & Garden -->
  <!-- Roof -->
  <path d="M120,200 L200,120 L280,200" fill="none" stroke="#86efac" stroke-width="4" stroke-linejoin="round"/>
  <!-- Walls -->
  <rect x="140" y="200" width="120" height="80" fill="#86efac" opacity="0.15" stroke="#86efac" stroke-width="3" rx="2"/>
  <!-- Door -->
  <rect x="180" y="235" width="40" height="45" rx="2" fill="#86efac" opacity="0.3" stroke="#86efac" stroke-width="2"/>
  <circle cx="213" cy="258" r="3" fill="#86efac"/>
  <!-- Window -->
  <rect x="150" y="215" width="22" height="20" rx="2" fill="none" stroke="#86efac" stroke-width="2"/>
  <line x1="161" y1="215" x2="161" y2="235" stroke="#86efac" stroke-width="1.5"/>
  <line x1="150" y1="225" x2="172" y2="225" stroke="#86efac" stroke-width="1.5"/>
  <!-- Plant -->
  <line x1="300" y1="280" x2="300" y2="240" stroke="#86efac" stroke-width="3"/>
  <circle cx="300" cy="230" r="15" fill="#86efac" opacity="0.3"/>
  <circle cx="290" cy="240" r="10" fill="#86efac" opacity="0.3"/>
  <circle cx="310" cy="238" r="12" fill="#86efac" opacity="0.3"/>
  <text x="200" y="330" text-anchor="middle" fill="#86efac" font-family="system-ui,sans-serif" font-size="22" font-weight="600">Home &amp; Garden</text>
</svg>
