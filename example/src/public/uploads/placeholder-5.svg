<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="12" fill="#7c2d12"/>
  <rect x="20" y="20" width="360" height="360" rx="8" fill="#9a3412" opacity="0.3"/>
  <!-- Football/sports ball icon for Sports -->
  <circle cx="200" cy="180" r="65" fill="none" stroke="#fdba74" stroke-width="4"/>
  <ellipse cx="200" cy="180" rx="65" ry="25" fill="none" stroke="#fdba74" stroke-width="2" opacity="0.5" transform="rotate(45 200 180)"/>
  <ellipse cx="200" cy="180" rx="65" ry="25" fill="none" stroke="#fdba74" stroke-width="2" opacity="0.5" transform="rotate(-45 200 180)"/>
  <!-- Stitching -->
  <line x1="200" y1="115" x2="200" y2="245" stroke="#fdba74" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="135" y1="180" x2="265" y2="180" stroke="#fdba74" stroke-width="2" stroke-dasharray="6,4" opacity="0.4"/>
  <!-- Motion lines -->
  <line x1="280" y1="140" x2="310" y2="130" stroke="#fdba74" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="160" x2="315" y2="155" stroke="#fdba74" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="180" x2="310" y2="180" stroke="#fdba74" stroke-width="2" opacity="0.4"/>
  <text x="200" y="310" text-anchor="middle" fill="#fdba74" font-family="system-ui,sans-serif" font-size="22" font-weight="600">Sports</text>
</svg>
